        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[43.63168845565417,4.685835884321668],[44.0541527621041,5.832372293020554]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topleft'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>TYPOLOGIE DES ACTIONS</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'bottomleft'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'
                this._div.setAttribute("onmouseenter", "abstract.show()");
                this._div.setAttribute("onmouseleave", "abstract.hide()");
                this.hide();
                return this._div;
            };
            abstract.hide = function () {
                this._div.classList.remove("abstractUncollapsed");
                this._div.classList.add("abstract");
                this._div.innerHTML = 'i'
            }
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'Cartographie interactive, élaborée à l’aide du logiciel QGIS, proposant de la répartition géographique des acteurs impliqués dans l’accompagnement des personnes touchées par le cancer dans le Vaucluse. On note une forte concentration d\'acteurs dans la partie ouest du département, notamment autour du bassin avignonnais, tout en prenant en compte des structures situées hors du territoire (comme à Marseille), dont les interventions profitent également aux habitants du Vaucluse.';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',

        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OSMStandard_0');
        map.getPane('pane_OSMStandard_0').style.zIndex = 400;
        var layer_OSMStandard_0 = L.tileLayer('http://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OSMStandard_0',
            opacity: 1.0,
            attribution: '<a href="https://www.openstreetmap.org/copyright">© OpenStreetMap contributors, CC-BY-SA</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OSMStandard_0;
        map.addLayer(layer_OSMStandard_0);
        function pop_VAUCLUSE_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_VAUCLUSE_1_0() {
            return {
                pane: 'pane_VAUCLUSE_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,255,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_VAUCLUSE_1');
        map.getPane('pane_VAUCLUSE_1').style.zIndex = 401;
        map.getPane('pane_VAUCLUSE_1').style['mix-blend-mode'] = 'normal';
        var layer_VAUCLUSE_1 = new L.geoJson(json_VAUCLUSE_1, {

            interactive: true,
            dataVar: 'json_VAUCLUSE_1',

        bounds_group.addLayer(layer_VAUCLUSE_1);
        map.addLayer(layer_VAUCLUSE_1);
        function pop_ACTEURSPROJETCANCER_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }

                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">VILLES</th>\
                        <td class="visible-with-data" id="VILLES">' + (feature.properties['VILLES'] !== null ? autolinker.link(String(feature.properties['VILLES']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">NOMS</th>\
                        <td class="visible-with-data" id="NOMS">' + (feature.properties['NOMS'] !== null ? autolinker.link(String(feature.properties['NOMS']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">ACTIONS</th>\
                        <td class="visible-with-data" id="ACTIONS">' + (feature.properties['ACTIONS'] !== null ? autolinker.link(String(feature.properties['ACTIONS']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">MISSIONS</th>\
                        <td class="visible-with-data" id="MISSIONS">' + (feature.properties['MISSIONS'] !== null ? autolinker.link(String(feature.properties['MISSIONS']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Contacts</th>\
                        <td class="visible-with-data" id="Contacts">' + (feature.properties['Contacts'] !== null ? autolinker.link(String(feature.properties['Contacts']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_ACTEURSPROJETCANCER_2_0(feature) {

                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(221,238,109,1.0)',

            }
                    break;
                case 'Orientation':
                    return {
                pane: 'pane_ACTEURSPROJETCANCER_2',
                radius: 3.6,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,

                fillColor: 'rgba(85,65,216,1.0)',

            }
                    break;
                case 'Prévention':
                    return {

                radius: 3.6,

                dashArray: '',

                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,

        }
        map.createPane('pane_ACTEURSPROJETCANCER_2');
        map.getPane('pane_ACTEURSPROJETCANCER_2').style.zIndex = 402;
        map.getPane('pane_ACTEURSPROJETCANCER_2').style['mix-blend-mode'] = 'normal';
        var layer_ACTEURSPROJETCANCER_2 = new L.geoJson(json_ACTEURSPROJETCANCER_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_ACTEURSPROJETCANCER_2',

            pointToLayer: function (feature, latlng) {

                    variables: {}

                return L.circleMarker(latlng, style_ACTEURSPROJETCANCER_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_ACTEURSPROJETCANCER_2);
        map.addLayer(layer_ACTEURSPROJETCANCER_2);
        const url = {"Nominatim OSM": "https://nominatim.openstreetmap.org/search?format=geojson&addressdetails=1&",
        "France BAN": "https://api-adresse.data.gouv.fr/search/?"}
        var photonControl = L.control.photon({

        photonControl._container.childNodes[0].style.borderRadius="10px"
        // Create a variable to store the geoJSON data
        var x = null;
        // Create a variable to store the marker
        var marker = null;
        // Add an event listener to the Photon control to create a marker from the returned geoJSON data
        var z = null;
        photonControl.on('selected', function(e) {
            console.log(photonControl.search.resultsContainer);
            if (x != null) {
                map.removeLayer(obj3.marker);

            }

            z = typeof e.choice.properties.label === 'undefined'? e.choice.properties.display_name : e.choice.properties.label;
            console.log(e);
            e.target.input.value = z;
        });
        var search = document.getElementsByClassName("leaflet-photon leaflet-control")[0];
        search.classList.add("leaflet-control-search")
        search.style.display = "flex";
        search.style.backgroundColor="rgba(255,255,255,0.5)" 

        // Create the new button element
        var button = document.createElement("div");

        var overlaysTree = [
            {label: 'ACTEURSPROJET CANCER <br /><table><tr><td style="text-align: center;"><img src="legend/ACTEURSPROJETCANCER_2_InterventionAccompagnement0.png" /></td><td>Intervention/Accompagnement</td></tr><tr><td style="text-align: center;"><img src="legend/ACTEURSPROJETCANCER_2_Orientation1.png" /></td><td>Orientation</td></tr><tr><td style="text-align: center;"><img src="legend/ACTEURSPROJETCANCER_2_Prévention2.png" /></td><td>Prévention</td></tr></table>', layer: layer_ACTEURSPROJETCANCER_2},
            {label: '<img src="legend/VAUCLUSE_1.png" /> VAUCLUSE', layer: layer_VAUCLUSE_1},
            {label: "OSM Standard", layer: layer_OSMStandard_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>
